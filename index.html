<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTubeClone</title>
    <meta name="description" content="YouTube Clone — смотри, загружай и управляй видео">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>▶️</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Шапка -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuBtn">☰</button>
            <a class="logo" href="#">
                <span class="logo-icon">▶</span>YouTubeClone
            </a>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Поиск">
            <button id="searchBtn" aria-label="Поиск">🔍</button>
        </div>

        <div class="header-right">
            <button id="themeBtn" class="icon-btn" title="Сменить тему">🌙</button>
            <button id="uploadBtn" class="upload-btn">
                <span>＋</span> Создать
            </button>
            <div class="avatar" id="userAvatar" title="Мой канал">Я</div>
        </div>
    </header>

    <div class="layout">
        <!-- Боковая панель -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a class="sidebar-item active" data-category="all" href="#">
                    <span class="sidebar-icon">🏠</span><span class="sidebar-label">Главная</span>
                </a>
                <a class="sidebar-item" data-category="subscriptions" href="#">
                    <span class="sidebar-icon">📺</span><span class="sidebar-label">Подписки</span>
                </a>
                <a class="sidebar-item" data-section="my-channel" href="#">
                    <span class="sidebar-icon">👤</span><span class="sidebar-label">Мой канал</span>
                </a>
                <a class="sidebar-item" data-section="history" href="#">
                    <span class="sidebar-icon">🕐</span><span class="sidebar-label">История</span>
                </a>
                <a class="sidebar-item" data-section="liked" href="#">
                    <span class="sidebar-icon">❤️</span><span class="sidebar-label">Понравившиеся</span>
                </a>
                <hr class="sidebar-divider">
                <div class="sidebar-section-title">Категории</div>
                <a class="sidebar-item" data-category="programming" href="#">
                    <span class="sidebar-icon">💻</span><span class="sidebar-label">Программирование</span>
                </a>
                <a class="sidebar-item" data-category="design" href="#">
                    <span class="sidebar-icon">🎨</span><span class="sidebar-label">Дизайн</span>
                </a>
                <a class="sidebar-item" data-category="music" href="#">
                    <span class="sidebar-icon">🎵</span><span class="sidebar-label">Музыка</span>
                </a>
                <a class="sidebar-item" data-category="entertainment" href="#">
                    <span class="sidebar-icon">😂</span><span class="sidebar-label">Развлечения</span>
                </a>
                <a class="sidebar-item" data-category="gaming" href="#">
                    <span class="sidebar-icon">🎮</span><span class="sidebar-label">Игры</span>
                </a>
                <a class="sidebar-item" data-category="sport" href="#">
                    <span class="sidebar-icon">⚽</span><span class="sidebar-label">Спорт</span>
                </a>
                <a class="sidebar-item" data-category="other" href="#">
                    <span class="sidebar-icon">📌</span><span class="sidebar-label">Другое</span>
                </a>
            </nav>
        </aside>

        <!-- Контент -->
        <main class="main-content" id="mainContent">

            <!-- Фильтры-чипсы -->
            <div class="chips-bar" id="chipsBar">
                <button class="chip active" data-category="all">Все</button>
                <button class="chip" data-category="programming">Программирование</button>
                <button class="chip" data-category="design">Дизайн</button>
                <button class="chip" data-category="music">Музыка</button>
                <button class="chip" data-category="entertainment">Развлечения</button>
                <button class="chip" data-category="gaming">Игры</button>
                <button class="chip" data-category="sport">Спорт</button>
                <button class="chip" data-category="other">Другое</button>
            </div>

            <!-- Сетка видео -->
            <div class="video-grid" id="videoGrid"></div>
            <p class="empty-state" id="emptyState" style="display:none;">
                Ничего не найдено 🔎
            </p>
        </main>
    </div>

    <!-- ====== ПЛЕЕР ====== -->
    <div class="modal-overlay" id="playerOverlay" style="display:none;">
        <div class="player-modal">
            <button class="modal-close" id="closePlayer">✕</button>
            <div class="player-body">
                <div class="video-frame" id="videoFrame"></div>
                <div class="player-info">
                    <h1 class="player-title" id="playerTitle"></h1>
                    <div class="player-meta-row">
                        <div class="player-channel">
                            <div class="channel-avatar" id="playerAvatar"></div>
                            <div>
                                <div class="channel-name" id="playerChannel"></div>
                                <div class="channel-subs" id="playerSubs"></div>
                            </div>
                            <button class="subscribe-btn" id="subscribeBtn">Подписаться</button>
                        </div>
                        <div class="player-actions">
                            <button class="action-pill" id="modalLikeBtn">
                                👍 <span id="modalLikeCount">0</span>
                            </button>
                            <button class="action-pill" id="modalDislikeBtn">👎</button>
                            <button class="action-pill" id="modalShareBtn">↗ Поделиться</button>
                            <button class="action-pill danger" id="modalDeleteBtn" style="display:none;">🗑 Удалить</button>
                        </div>
                    </div>
                    <div class="player-description" id="playerDescription"></div>
                    <div class="player-stats">
                        <span id="playerViews"></span>
                        <span id="playerDate"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== ЗАГРУЗКА ВИДЕО ====== -->
    <div class="modal-overlay" id="uploadOverlay" style="display:none;">
        <div class="upload-modal">
            <div class="upload-header">
                <h2>Загрузить видео</h2>
                <button class="modal-close" id="closeUpload">✕</button>
            </div>
            <form id="uploadForm" class="upload-form">
                <div class="form-row">
                    <div class="form-left">
                        <!-- Превью обложки -->
                        <div class="thumbnail-picker" id="thumbnailPicker">
                            <div class="thumb-preview" id="thumbPreview">
                                <span class="thumb-emoji" id="thumbEmoji">🎬</span>
                            </div>
                            <div class="thumb-options">
                                <p class="form-label">Обложка</p>
                                <div class="emoji-grid" id="emojiGrid">
                                    <button type="button" class="emoji-opt" data-emoji="🎬">🎬</button>
                                    <button type="button" class="emoji-opt" data-emoji="💻">💻</button>
                                    <button type="button" class="emoji-opt" data-emoji="🎨">🎨</button>
                                    <button type="button" class="emoji-opt" data-emoji="🎵">🎵</button>
                                    <button type="button" class="emoji-opt" data-emoji="🎮">🎮</button>
                                    <button type="button" class="emoji-opt" data-emoji="📚">📚</button>
                                    <button type="button" class="emoji-opt" data-emoji="🌍">🌍</button>
                                    <button type="button" class="emoji-opt" data-emoji="⚽">⚽</button>
                                    <button type="button" class="emoji-opt" data-emoji="🍕">🍕</button>
                                    <button type="button" class="emoji-opt" data-emoji="🚀">🚀</button>
                                    <button type="button" class="emoji-opt" data-emoji="😂">😂</button>
                                    <button type="button" class="emoji-opt" data-emoji="🎯">🎯</button>
                                </div>
                                <div class="color-options">
                                    <p class="form-label">Цвет фона</p>
                                    <div class="color-grid" id="colorGrid">
                                        <button type="button" class="color-opt" data-color="#6c5ce7" style="background:#6c5ce7"></button>
                                        <button type="button" class="color-opt" data-color="#00b894" style="background:#00b894"></button>
                                        <button type="button" class="color-opt" data-color="#e17055" style="background:#e17055"></button>
                                        <button type="button" class="color-opt" data-color="#0984e3" style="background:#0984e3"></button>
                                        <button type="button" class="color-opt" data-color="#fd79a8" style="background:#fd79a8"></button>
                                        <button type="button" class="color-opt" data-color="#fdcb6e" style="background:#fdcb6e"></button>
                                        <button type="button" class="color-opt" data-color="#d63031" style="background:#d63031"></button>
                                        <button type="button" class="color-opt" data-color="#00cec9" style="background:#00cec9"></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-right">
                        <label class="form-label">
                            Название <span class="required">*</span>
                            <input type="text" id="uploadTitle" maxlength="100" placeholder="Придумайте название..." required>
                            <span class="char-count" id="titleCount">0/100</span>
                        </label>

                        <label class="form-label">
                            Описание
                            <textarea id="uploadDesc" maxlength="500" placeholder="Расскажите о видео..." rows="3"></textarea>
                            <span class="char-count" id="descCount">0/500</span>
                        </label>

                        <label class="form-label">
                            Ссылка на YouTube (необязательно)
                            <input type="url" id="uploadUrl" placeholder="https://youtube.com/watch?v=...">
                        </label>

                        <div class="form-row-2">
                            <label class="form-label">
                                Категория
                                <select id="uploadCategory">
                                    <option value="programming">💻 Программирование</option>
                                    <option value="design">🎨 Дизайн</option>
                                    <option value="music">🎵 Музыка</option>
                                    <option value="entertainment">😂 Развлечения</option>
                                    <option value="gaming">🎮 Игры</option>
                                    <option value="sport">⚽ Спорт</option>
                                    <option value="other">📌 Другое</option>
                                </select>
                            </label>
                            <label class="form-label">
                                Название канала
                                <input type="text" id="uploadAuthor" placeholder="Мой канал" maxlength="60">
                            </label>
                        </div>
                    </div>
                </div>

                <div class="upload-footer">
                    <button type="button" class="btn-secondary" id="cancelUpload">Отмена</button>
                    <button type="submit" class="btn-primary">Опубликовать</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ====== ПОДЕЛИТЬСЯ ====== -->
    <div class="modal-overlay" id="shareOverlay" style="display:none;">
        <div class="share-modal">
            <div class="upload-header">
                <h2>Поделиться</h2>
                <button class="modal-close" id="closeShare">✕</button>
            </div>
            <p class="share-hint">Скопируй ссылку:</p>
            <div class="share-link-row">
                <input type="text" id="shareLink" readonly>
                <button class="btn-primary" id="copyLinkBtn">Копировать</button>
            </div>
            <div class="share-toast" id="shareToast">✅ Скопировано!</div>
        </div>
    </div>

    <!-- ====== ТОСТ УВЕДОМЛЕНИЯ ====== -->
    <div class="toast" id="toast"></div>

    <footer class="footer">
        <p>YouTubeClone — учебный проект · <a href="https://github.com/Zenka737/youtubeclone" target="_blank" rel="noopener">GitHub</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
